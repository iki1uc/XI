<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>XI · Station</title>

<style>
body { background:#000; color:#0f0; font-family:Consolas; padding:20px; }
h1, h2 { color:#6cf; }
pre { background:#111; border:1px solid #333; padding:12px; }
a { color:#6cf; display:block; margin:10px 0; }
.grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
</style>
</head>

<body>

<h1>XI · Station</h1>

<pre id="grml_out">
CORE        = XI
VERSION     = 1.0
STATE       = rdy
LEVEL       = rot
READY       = 100%
</pre>

<h2>Module</h2>
<div class="grid">
  <a href="./HOST.html">XI · HOST</a>
  <a href="./ID.html">Identität</a>
  <a href="./KERNEL.me">Kernel</a>
  <a href="./MATRIX.me">Matrix</a>
  <a href="./VECTOR.me">Vector</a>
  <a href="./NC.math">NC · Math</a>
  <a href="./XI-NC3×3.room">NC · 3×3</a>
  <a href="./XI-NC6eI6D.room">NC · 6eI6D</a>
  <a href="./XI-NC9×9.room">NC · 9×9</a>
  <a href="./X.room.CORE">X · CORE</a>
  <a href="./X.room.IN">X · IN</a>
  <a href="./X.room.OUT">X · OUT</a>
</div>

<script>
// --- XI-SCAN (einfach, klar, funktioniert) ---
async function XI_SCAN(){
    const files = [
        "HOST.html",
        "ID.html",
        "KERNEL.me",
        "MATRIX.me",
        "VECTOR.me",
        "NC.math",
        "XI-NC3×3.room",
        "XI-NC6eI6D.room",
        "XI-NC9×9.room",
        "X.room.CORE",
        "X.room.IN",
        "X.room.OUT",
        "index.html"
    ];

    const out = { rot:[], gelb:[], gruen:[] };

    for(const f of files){
        try {
            const res = await fetch(`./${f}`);
            if(!res.ok){
                out.rot.push(f);
                continue;
            }

            const txt = await res.text();
            if(txt.trim().length === 0){
                out.gelb.push(f);
            } else {
                out.gruen.push(f);
            }

        } catch(e){
            out.rot.push(f);
        }
    }

    return out;
}

// --- XI → X.room Routing ---
function XI_TO_XROOM(name, level){
    if(level === "rot"){
        console.log("XI → X.room.OUT:", name);
    } else if(level === "gelb"){
        console.log("XI → X.room.IN:", name);
    } else {
        console.log("XI → X.room.CORE:", name);
    }
}

// --- Start ---
(async () => {
    const scan = await XI_SCAN();
    const out = document.getElementById("grml_out");

    out.innerHTML += "\nROT   = " + JSON.stringify(scan.rot);
    out.innerHTML += "\nGELB  = " + JSON.stringify(scan.gelb);
    out.innerHTML += "\nGRUEN = " + JSON.stringify(scan.gruen);

    // Routing für rote Dateien
    scan.rot.forEach(f => XI_TO_XROOM(f, "rot"));

    // Routing für gelbe Dateien
    scan.gelb.forEach(f => XI_TO_XROOM(f, "gelb"));

    // Routing für grüne Dateien
    scan.gruen.forEach(f => XI_TO_XROOM(f, "gruen"));
})();
</script>

</body>
</html>
