<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>XI · NC-Station</title>

<style>
body { background:#000; color:#0f0; font-family:monospace; padding:40px; }
h1 { color:#6cf; text-align:center; }

#geo {
    width: 360px;
    height: 360px;
    margin: auto;
    border: 3px solid #6cf;
    border-radius: 50%;
    position: relative;
    animation: spin 10s linear infinite;
}

.dot {
    width: 10px;
    height: 10px;
    background:#0f0;
    border-radius:50%;
    position:absolute;
}

pre {
    background:#111;
    padding:20px;
    border-left:3px solid #6cf;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
}
</style>

<script src="XI.core.js"></script>
<script src="XI.scan.js"></script>
<script src="XI.kernel.js"></script>
<script src="XI.vector.js"></script>
<script src="XI.matrix.js"></script>
<script src="XI.pipe.js"></script>

</head>

<body>

<h1>XI · NC-Station</h1>

<div id="geo"></div>
<pre id="status">Lade XI…</pre>

<script>
const geo = document.getElementById("geo");
const count = 81;
const radius = 160;

for(let i=0; i<count; i++){
    const dot = document.createElement("div");
    dot.className = "dot";

    const angle = (i / count) * Math.PI * 2;
    const x = Math.cos(angle) * radius + 180 - 5;
    const y = Math.sin(angle) * radius + 180 - 5;

    dot.style.left = x + "px";
    dot.style.top = y + "px";

    geo.appendChild(dot);
}

XI.enter(99);
XI.scan = XI_SCAN.detect(XI.input);
XI.kernel = XI_KERNEL.process(XI.scan.hash);
XI.vector = XI_VECTOR.build(XI.kernel.core);
XI.matrix = XI_MATRIX.build(XI.kernel.core);

const result = XI.compute();
const forward = XI_PIPE.forward(result);

document.getElementById("status").innerText =
    JSON.stringify({ XI: result, forward }, null, 2);
</script>

</body>
</html>
